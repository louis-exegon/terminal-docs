site_name: HY Credit Screener — Field Reference
site_description: Field-by-field documentation for the yfinance-based high-yield credit screener.
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-sunny, name: Switch to light mode }
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - toc.integrate
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.superfences
  - pymdownx.inlinehilite
nav:
  - Home: index.md
  - Concepts:
      - The field contract: concepts/contract.md
      - The engine: concepts/engine.md
